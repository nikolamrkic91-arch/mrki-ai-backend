services:
  - type: web
    name: mrki-ai-backend
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      pip install fastapi uvicorn sqlalchemy alembic pydantic python-jose passlib httpx click rich structlog apscheduler croniter python-dateutil tenacity jinja2 pyyaml python-multipart aiohttp watchdog
    startCommand: python main.py --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
