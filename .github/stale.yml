# Configuration for probot-stale - https://github.com/probot/stale

# Number of days of inactivity before an Issue or Pull Request becomes stale
daysUntilStale: 60

# Number of days of inactivity before an Issue or Pull Request with the stale label is closed
# Set to false to disable. If disabled, issues still need to be closed manually
daysUntilClose: 14

# Only issues or pull requests with all of these labels are check if stale
onlyLabels: []

# Issues or Pull Requests with these labels will never be considered stale
exemptLabels:
  - pinned
  - security
  - "priority/critical"
  - "priority/high"

# Set to true to ignore issues in a project
exemptProjects: false

# Set to true to ignore issues in a milestone
exemptMilestones: false

# Set to true to ignore issues with an assignee
exemptAssignees: false

# Label to use when marking as stale
staleLabel: stale

# Comment to post when marking as stale
markComment: >
  This issue has been automatically marked as stale because it has not had
  recent activity. It will be closed if no further activity occurs.
  
  If this issue is still relevant, please comment to keep it open.
  Thank you for your contributions!

# Comment to post when removing the stale label
unmarkComment: >
  This issue has been updated and is no longer stale.

# Comment to post when closing a stale Issue or Pull Request
closeComment: >
  This issue has been automatically closed due to inactivity.
  
  If you believe this issue is still relevant, please open a new issue
  with updated information. Thank you!

# Limit the number of actions per hour
limitPerRun: 30

# Limit to only `issues` or `pulls`
only: issues

# Optionally, specify configuration settings that are specific to just 'issues' or 'pulls'
# pulls:
#   daysUntilStale: 30
#   markComment: >
#     This pull request has been automatically marked as stale...

# issues:
#   exemptLabels:
#     - confirmed
