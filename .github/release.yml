# GitHub Release Notes Configuration
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
    authors:
      - octocat
      - dependabot
      - renovate
  categories:
    - title: Breaking Changes 🚨
      labels:
        - breaking change
        - breaking-change
    - title: New Features ✨
      labels:
        - feature
        - enhancement
    - title: Bug Fixes 🐛
      labels:
        - bug
        - fix
    - title: Security 🔒
      labels:
        - security
    - title: Performance ⚡
      labels:
        - performance
    - title: Documentation 📚
      labels:
        - documentation
        - docs
    - title: Other Changes
      labels:
        - "*"
