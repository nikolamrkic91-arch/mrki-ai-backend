# GitHub Labels Configuration
# Apply with: github-label-sync --labels .github/labels.yml mrki/mrki

# Type labels
- name: bug
  color: d73a4a
  description: Something isn't working

- name: feature
  color: a2eeef
  description: New feature or request

- name: enhancement
  color: a2eeef
  description: Improvement to existing feature

- name: documentation
  color: 0075ca
  description: Improvements or additions to documentation

- name: question
  color: d876e3
  description: Further information is requested

# Priority labels
- name: priority/critical
  color: b60205
  description: Critical priority

- name: priority/high
  color: d93f0b
  description: High priority

- name: priority/medium
  color: fbca04
  description: Medium priority

- name: priority/low
  color: 0e8a16
  description: Low priority

# Status labels
- name: status/triage
  color: fef2c0
  description: Needs triage

- name: status/confirmed
  color: c2e0c6
  description: Confirmed issue

- name: status/in-progress
  color: ffd54f
  description: Currently being worked on

- name: status/blocked
  color: e99695
  description: Blocked by another issue

- name: status/needs-review
  color: c5def5
  description: Needs code review

- name: status/needs-testing
  color: d4c5f9
  description: Needs testing

- name: status/ready-to-merge
  color: 0e8a16
  description: Ready to merge

# Area labels
- name: area/api
  color: 0052cc
  description: API related

- name: area/cli
  color: 0052cc
  description: CLI related

- name: area/web
  color: 0052cc
  description: Web interface related

- name: area/core
  color: 0052cc
  description: Core functionality

- name: area/plugins
  color: 0052cc
  description: Plugin system

- name: area/database
  color: 0052cc
  description: Database related

- name: area/security
  color: 0052cc
  description: Security related

- name: area/performance
  color: 0052cc
  description: Performance related

# Special labels
- name: good first issue
  color: 7057ff
  description: Good for newcomers

- name: help wanted
  color: 008672
  description: Extra attention is needed

- name: duplicate
  color: cfd3d7
  description: This issue or PR already exists

- name: invalid
  color: e4e669
  description: This doesn't seem right

- name: wontfix
  color: ffffff
  description: This won't be worked on

- name: breaking change
  color: b60205
  description: Breaking change

- name: dependencies
  color: 0366d6
  description: Pull requests that update a dependency file

- name: stale
  color: ffffff
  description: Stale issue or PR
