AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Mrki Serverless Functions

# =============================================================================
# Global Configuration
# =============================================================================
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.11
    Architectures:
      - x86_64
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        LOG_LEVEL: INFO
    Tracing: Active
    Tags:
      Project: mrki
      Environment: !Ref Environment

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  Environment:
    Type: String
    Default: development
    AllowedValues:
      - development
      - staging
      - production
    Description: Deployment environment

# =============================================================================
# Resources
# =============================================================================
Resources:
  # ==========================================================================
  # API Gateway
  # ==========================================================================
  MrkiApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      TracingEnabled: true
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Request-ID'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"
      Auth:
        DefaultAuthorizer: LambdaAuthorizer
        Authorizers:
          LambdaAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            Identity:
              Header: Authorization
              ValidationExpression: ^Bearer [-0-9a-zA-Z\._]*$
              ReauthorizeEvery: 300
      MethodSettings:
        - ResourcePath: /*
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true

  # ==========================================================================
  # Main Lambda Function
  # ==========================================================================
  MrkiProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mrki-processor-${Environment}"
      Handler: handler.lambda_handler
      CodeUri: ./
      Description: Main Mrki processor function
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub "arn:aws:s3:::mrki-*-${Environment}-*/*"
            - Effect: Allow
              Action:
                - sqs:SendMessage
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt MrkiQueue.Arn
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref MrkiTopic
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource: !GetAtt MrkiTable.Arn
      Events:
        # API Gateway trigger
        ApiEvent:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
            RestApiId: !Ref MrkiApi
        
        # S3 trigger
        S3Event:
          Type: S3
          Properties:
            Bucket: !Ref MrkiBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: uploads/
        
        # SQS trigger
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt MrkiQueue.Arn
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 5
        
        # Scheduled event
        ScheduledEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Name: mrki-scheduled-task
            Description: Scheduled task for Mrki
            Enabled: true
      
      Environment:
        Variables:
          DB_HOST: !Sub "{{resolve:secretsmanager:mrki/${Environment}/database:SecretString:host}}"
          DB_NAME: !Sub "{{resolve:secretsmanager:mrki/${Environment}/database:SecretString:dbname}}"
          REDIS_HOST: !Sub "{{resolve:secretsmanager:mrki/${Environment}/redis:SecretString:host}}"
          S3_BUCKET: !Ref MrkiBucket
          SQS_QUEUE_URL: !Ref MrkiQueue
          SNS_TOPIC_ARN: !Ref MrkiTopic
      
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue PrivateSubnet1
          - !ImportValue PrivateSubnet2
      
      AutoPublishAlias: live
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref ErrorsAlarm
        Hooks:
          PreTraffic: !Ref PreTrafficHookFunction

  # ==========================================================================
  # Authorizer Lambda Function
  # ==========================================================================
  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mrki-authorizer-${Environment}"
      Handler: authorizer.handler
      CodeUri: ./
      Description: API Gateway Lambda Authorizer
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mrki/*"

  # ==========================================================================
  # Pre-traffic Hook Function
  # ==========================================================================
  PreTrafficHookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "mrki-pre-traffic-hook-${Environment}"
      Handler: pre_traffic_hook.handler
      CodeUri: ./
      Description: Pre-traffic hook for deployment validation
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - codedeploy:PutLifecycleEventHookExecutionStatus
              Resource: '*'

  # ==========================================================================
  # S3 Bucket
  # ==========================================================================
  MrkiBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "mrki-data-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref S3KMSKey
            BucketKeyEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
              - StorageClass: GLACIER
                TransitionInDays: 365
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
            AllowedOrigins:
              - '*'
            MaxAge: 3600
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt MrkiProcessorFunction.Arn
            Filter:
              KeyFilterRules:
                - Name: prefix
                  Value: uploads/

  # ==========================================================================
  # SQS Queue
  # ==========================================================================
  MrkiQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "mrki-queue-${Environment}"
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt MrkiDLQ.Arn
        maxReceiveCount: 3
      KmsMasterKeyId: !Ref SQS KMSKey

  MrkiDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "mrki-dlq-${Environment}"
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !Ref SQS KMSKey

  # ==========================================================================
  # SNS Topic
  # ==========================================================================
  MrkiTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "mrki-topic-${Environment}"
      KmsMasterKeyId: !Ref SNS KMSKey

  # ==========================================================================
  # DynamoDB Table
  # ==========================================================================
  MrkiTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "mrki-table-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref DynamoDB KMSKey

  # ==========================================================================
  # Security Group
  # ==========================================================================
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Mrki Lambda functions
      VpcId: !ImportValue VPCId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # ==========================================================================
  # KMS Keys
  # ==========================================================================
  S3KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for S3 encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: '*'

  SQS KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for SQS encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: '*'

  SNS KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for SNS encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: '*'

  DynamoDB KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for DynamoDB encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: '*'

  # ==========================================================================
  # CloudWatch Alarms
  # ==========================================================================
  ErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "mrki-lambda-errors-${Environment}"
      AlarmDescription: Alarm for Lambda function errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref MrkiProcessorFunction

  # ==========================================================================
  # Log Group
  # ==========================================================================
  MrkiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/mrki-processor-${Environment}"
      RetentionInDays: 30

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  MrkiApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${MrkiApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/"
  
  MrkiFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt MrkiProcessorFunction.Arn
  
  MrkiBucketName:
    Description: S3 bucket name
    Value: !Ref MrkiBucket
  
  MrkiQueueUrl:
    Description: SQS queue URL
    Value: !Ref MrkiQueue
  
  MrkiTopicArn:
    Description: SNS topic ARN
    Value: !Ref MrkiTopic
