# =============================================================================
# Object Bucket Claim (OBC) for Mrki Applications
# =============================================================================
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: mrki-assets-bucket
  namespace: mrki-apps
spec:
  generateBucketName: mrki-assets
  storageClassName: rook-ceph-bucket
---
# =============================================================================
# External S3 Secret (for using cloud provider S3)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aws-s3-credentials
  namespace: mrki-apps
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: "mrki-assets-production"
---
# =============================================================================
# External GCS Secret
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gcs-credentials
  namespace: mrki-apps
type: Opaque
stringData:
  GOOGLE_APPLICATION_CREDENTIALS: "/etc/gcp/key.json"
  GCS_BUCKET_NAME: "mrki-assets-production"
