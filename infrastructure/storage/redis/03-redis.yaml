# =============================================================================
# Redis StatefulSet for Mrki
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mrki-redis
  namespace: mrki-data
  labels:
    app: mrki-redis
    tier: cache
spec:
  serviceName: mrki-redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: mrki-redis
  template:
    metadata:
      labels:
        app: mrki-redis
        tier: cache
    spec:
      serviceAccountName: mrki-redis
      securityContext:
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            - redis-server
            - /etc/redis/redis.conf
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mrki-redis-secret
                  key: password
          livenessProbe:
            exec:
              command:
                - redis-cli
                - '-a'
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - '-a'
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      volumes:
        - name: config
          configMap:
            name: mrki-redis-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
---
# =============================================================================
# Redis ConfigMap
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mrki-redis-config
  namespace: mrki-data
data:
  redis.conf: |
    # Network
    bind 0.0.0.0
    port 6379
    protected-mode yes
    
    # Authentication
    requirepass ${REDIS_PASSWORD}
    
    # Persistence
    save 900 1
    save 300 10
    save 60 10000
    
    # RDB
    dbfilename dump.rdb
    dir /data
    rdbcompression yes
    rdbchecksum yes
    
    # AOF
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    
    # Memory Management
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    
    # Replication
    replica-serve-stale-data yes
    replica-read-only yes
    repl-diskless-sync no
    repl-diskless-sync-delay 5
    repl-ping-replica-period 10
    repl-timeout 60
    repl-disable-tcp-nodelay no
    
    # Logging
    loglevel notice
    
    # Limits
    maxclients 10000
    
    # Slow Log
    slowlog-log-slower-than 10000
    slowlog-max-len 128
    
    # Latency Monitor
    latency-monitor-threshold 0
---
# =============================================================================
# Redis Secrets
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mrki-redis-secret
  namespace: mrki-data
type: Opaque
stringData:
  password: "CHANGE_ME_IN_PRODUCTION"
---
# =============================================================================
# Redis Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: mrki-redis
  namespace: mrki-data
  labels:
    app: mrki-redis
spec:
  type: ClusterIP
  selector:
    app: mrki-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
# =============================================================================
# Redis ServiceAccount
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mrki-redis
  namespace: mrki-data
---
# =============================================================================
# Redis Exporter
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: monitoring
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: exporter
          image: oliver006/redis_exporter:v1.55.0
          ports:
            - name: metrics
              containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: "redis://mrki-redis.mrki-data.svc.cluster.local:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mrki-redis-secret
                  key: password
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
