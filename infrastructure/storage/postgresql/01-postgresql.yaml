# =============================================================================
# PostgreSQL StatefulSet for Mrki
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mrki-postgres
  namespace: mrki-data
  labels:
    app: mrki-postgres
    tier: database
spec:
  serviceName: mrki-postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: mrki-postgres
  template:
    metadata:
      labels:
        app: mrki-postgres
        tier: database
    spec:
      serviceAccountName: mrki-postgres
      securityContext:
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:15.4-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: mrki-postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mrki-postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mrki-postgres-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF8 --locale=en_US.UTF-8"
          args:
            - '-c'
            - 'max_connections=200'
            - '-c'
            - 'shared_buffers=256MB'
            - '-c'
            - 'effective_cache_size=768MB'
            - '-c'
            - 'maintenance_work_mem=64MB'
            - '-c'
            - 'checkpoint_completion_target=0.9'
            - '-c'
            - 'wal_buffers=16MB'
            - '-c'
            - 'default_statistics_target=100'
            - '-c'
            - 'random_page_cost=1.1'
            - '-c'
            - 'effective_io_concurrency=200'
            - '-c'
            - 'work_mem=4MB'
            - '-c'
            - 'min_wal_size=1GB'
            - '-c'
            - 'max_wal_size=4GB'
            - '-c'
            - 'max_worker_processes=4'
            - '-c'
            - 'max_parallel_workers_per_gather=2'
            - '-c'
            - 'max_parallel_workers=4'
            - '-c'
            - 'max_parallel_maintenance_workers=2'
            - '-c'
            - 'log_statement=all'
            - '-c'
            - 'log_duration=on'
            - '-c'
            - 'log_min_duration_statement=1000'
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      volumes:
        - name: init-scripts
          configMap:
            name: mrki-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 50Gi
---
# =============================================================================
# PostgreSQL ConfigMap
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mrki-postgres-config
  namespace: mrki-data
data:
  POSTGRES_DB: "mrki"
---
# =============================================================================
# PostgreSQL Secrets
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mrki-postgres-secret
  namespace: mrki-data
type: Opaque
stringData:
  username: "mrki_admin"
  password: "CHANGE_ME_IN_PRODUCTION"
---
# =============================================================================
# PostgreSQL Init Scripts
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mrki-postgres-init
  namespace: mrki-data
data:
  01-init.sql: |
    -- Create application user
    CREATE USER mrki_app WITH PASSWORD 'CHANGE_ME_IN_PRODUCTION';
    
    -- Grant privileges
    GRANT CONNECT ON DATABASE mrki TO mrki_app;
    GRANT USAGE ON SCHEMA public TO mrki_app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO mrki_app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO mrki_app;
    
    -- Create extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";
    CREATE EXTENSION IF NOT EXISTS "citext";
    
    -- Create schema
    CREATE SCHEMA IF NOT EXISTS mrki;
    GRANT USAGE ON SCHEMA mrki TO mrki_app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA mrki GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO mrki_app;
  
  02-monitoring.sql: |
    -- Create monitoring user for Prometheus exporter
    CREATE USER monitoring WITH PASSWORD 'CHANGE_ME_IN_PRODUCTION';
    GRANT pg_monitor TO monitoring;
    GRANT CONNECT ON DATABASE mrki TO monitoring;
    GRANT USAGE ON SCHEMA public TO monitoring;
    GRANT SELECT ON ALL TABLES IN SCHEMA public TO monitoring;
---
# =============================================================================
# PostgreSQL ServiceAccount
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mrki-postgres
  namespace: mrki-data
---
# =============================================================================
# PostgreSQL Exporter (Sidecar pattern)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: monitoring
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-exporter-secret
                  key: DATA_SOURCE_NAME
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-exporter-secret
  namespace: monitoring
type: Opaque
stringData:
  DATA_SOURCE_NAME: "postgresql://monitoring:CHANGE_ME@mrki-postgres.mrki-data.svc.cluster.local:5432/mrki?sslmode=disable"
