# =============================================================================
# Grafana Configuration for Mrki
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 5s
          httpMethod: POST
          manageAlerts: true
          prometheusType: Prometheus
          cacheLevel: 'High'
          incrementalQuerying: true
      
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        editable: false
        jsonData:
          maxLines: 1000
          derivedFields:
            - name: TraceID
              matcherRegex: '"trace_id":"(\w+)"'
              url: '$${__value.raw}'
              datasourceUid: tempo
      
      - name: Tempo
        type: tempo
        url: http://tempo:3200
        access: proxy
        editable: false
        uid: tempo
      
      - name: Jaeger
        type: jaeger
        url: http://jaeger:16686
        access: proxy
        editable: false
      
      - name: CloudWatch
        type: cloudwatch
        editable: false
        jsonData:
          authType: default
          defaultRegion: us-east-1
      
      - name: Alertmanager
        type: alertmanager
        url: http://alertmanager:9093
        access: proxy
        editable: false
        jsonData:
          implementation: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-providers
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
