# =============================================================================
# Database Backup CronJobs for Mrki
# =============================================================================

# =============================================================================
# PostgreSQL Backup CronJob
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: mrki-data
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          serviceAccountName: backup-sa
          restartPolicy: OnFailure
          containers:
            - name: postgres-backup
              image: postgres:15.4-alpine
              command:
                - /bin/sh
                - '-c'
                - |
                  set -e
                  
                  # Create backup directory
                  BACKUP_DIR="/backups/postgres/$(date +%Y%m%d)"
                  mkdir -p "$BACKUP_DIR"
                  
                  # Perform backup
                  echo "Starting PostgreSQL backup..."
                  pg_dump \
                    -h mrki-postgres.mrki-data.svc.cluster.local \
                    -U "$POSTGRES_USER" \
                    -d "$POSTGRES_DB" \
                    -F custom \
                    -Z 9 \
                    -f "$BACKUP_DIR/mrki-$(date +%H%M%S).dump"
                  
                  # Verify backup
                  echo "Verifying backup..."
                  pg_restore -l "$BACKUP_DIR/mrki-$(date +%H%M%S).dump" > /dev/null
                  
                  # Upload to S3
                  echo "Uploading to S3..."
                  aws s3 sync "$BACKUP_DIR" "s3://$S3_BUCKET/postgres/" --storage-class STANDARD_IA
                  
                  # Cleanup old local backups
                  find /backups/postgres -type f -mtime +1 -delete
                  
                  echo "Backup completed successfully!"
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: mrki-postgres-secret
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mrki-postgres-secret
                      key: password
                - name: POSTGRES_DB
                  value: "mrki"
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-backup-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_REGION
                  value: "us-east-1"
                - name: S3_BUCKET
                  value: "mrki-backups-production"
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mrki-postgres-secret
                      key: password
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              emptyDir:
                sizeLimit: 10Gi
---
# =============================================================================
# MongoDB Backup CronJob
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-backup
  namespace: mrki-data
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: mongodb-backup
        spec:
          serviceAccountName: backup-sa
          restartPolicy: OnFailure
          containers:
            - name: mongodb-backup
              image: mongo:7.0
              command:
                - /bin/sh
                - '-c'
                - |
                  set -e
                  
                  # Create backup directory
                  BACKUP_DIR="/backups/mongodb/$(date +%Y%m%d)"
                  mkdir -p "$BACKUP_DIR"
                  
                  # Perform backup
                  echo "Starting MongoDB backup..."
                  mongodump \
                    --host "mrki-mongodb.mrki-data.svc.cluster.local:27017" \
                    --username "$MONGO_USER" \
                    --password "$MONGO_PASSWORD" \
                    --db mrki \
                    --authenticationDatabase admin \
                    --gzip \
                    --out "$BACKUP_DIR/mrki-$(date +%H%M%S)"
                  
                  # Create archive
                  echo "Creating archive..."
                  tar -czf "$BACKUP_DIR/mrki-$(date +%H%M%S).tar.gz" -C "$BACKUP_DIR" "mrki-$(date +%H%M%S)"
                  rm -rf "$BACKUP_DIR/mrki-$(date +%H%M%S)"
                  
                  # Upload to S3
                  echo "Uploading to S3..."
                  aws s3 sync "$BACKUP_DIR" "s3://$S3_BUCKET/mongodb/" --storage-class STANDARD_IA
                  
                  # Cleanup old local backups
                  find /backups/mongodb -type f -mtime +1 -delete
                  
                  echo "Backup completed successfully!"
              env:
                - name: MONGO_USER
                  valueFrom:
                    secretKeyRef:
                      name: mrki-mongodb-secret
                      key: username
                - name: MONGO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mrki-mongodb-secret
                      key: password
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-backup-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_REGION
                  value: "us-east-1"
                - name: S3_BUCKET
                  value: "mrki-backups-production"
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              emptyDir:
                sizeLimit: 10Gi
---
# =============================================================================
# Redis Backup CronJob
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-backup
  namespace: mrki-data
spec:
  schedule: "0 */12 * * *"  # Every 12 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: redis-backup
        spec:
          serviceAccountName: backup-sa
          restartPolicy: OnFailure
          containers:
            - name: redis-backup
              image: redis:7.2-alpine
              command:
                - /bin/sh
                - '-c'
                - |
                  set -e
                  
                  # Create backup directory
                  BACKUP_DIR="/backups/redis/$(date +%Y%m%d)"
                  mkdir -p "$BACKUP_DIR"
                  
                  # Trigger BGSAVE and wait
                  echo "Triggering Redis BGSAVE..."
                  redis-cli -h mrki-redis.mrki-data.svc.cluster.local \
                    -a "$REDIS_PASSWORD" \
                    BGSAVE
                  
                  # Wait for save to complete
                  sleep 10
                  
                  # Copy RDB file
                  echo "Copying RDB file..."
                  kubectl cp mrki-data/mrki-redis-0:/data/dump.rdb "$BACKUP_DIR/dump-$(date +%H%M%S).rdb"
                  
                  # Upload to S3
                  echo "Uploading to S3..."
                  aws s3 sync "$BACKUP_DIR" "s3://$S3_BUCKET/redis/" --storage-class STANDARD_IA
                  
                  # Cleanup old local backups
                  find /backups/redis -type f -mtime +1 -delete
                  
                  echo "Backup completed successfully!"
              env:
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mrki-redis-secret
                      key: password
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-backup-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_REGION
                  value: "us-east-1"
                - name: S3_BUCKET
                  value: "mrki-backups-production"
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              emptyDir:
                sizeLimit: 5Gi
---
# =============================================================================
# Backup Retention Cleanup CronJob
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-cleanup
  namespace: mrki-data
spec:
  schedule: "0 3 * * *"  # Daily at 3 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: backup-cleanup
        spec:
          serviceAccountName: backup-sa
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: amazon/aws-cli:latest
              command:
                - /bin/sh
                - '-c'
                - |
                  echo "Cleaning up old backups..."
                  
                  # Delete PostgreSQL backups older than 30 days
                  aws s3 ls s3://$S3_BUCKET/postgres/ | while read -r line; do
                    createDate=$(echo "$line" | awk '{print $1" "$2}')
                    createDate=$(date -d "$createDate" +%s)
                    olderThan=$(date -d "30 days ago" +%s)
                    if [[ $createDate -lt $olderThan ]]; then
                      filename=$(echo "$line" | awk '{print $4}')
                      if [[ -n $filename ]]; then
                        echo "Deleting: $filename"
                        aws s3 rm "s3://$S3_BUCKET/postgres/$filename"
                      fi
                    fi
                  done
                  
                  # Delete MongoDB backups older than 30 days
                  aws s3 ls s3://$S3_BUCKET/mongodb/ | while read -r line; do
                    createDate=$(echo "$line" | awk '{print $1" "$2}')
                    createDate=$(date -d "$createDate" +%s)
                    olderThan=$(date -d "30 days ago" +%s)
                    if [[ $createDate -lt $olderThan ]]; then
                      filename=$(echo "$line" | awk '{print $4}')
                      if [[ -n $filename ]]; then
                        echo "Deleting: $filename"
                        aws s3 rm "s3://$S3_BUCKET/mongodb/$filename"
                      fi
                    fi
                  done
                  
                  echo "Cleanup completed!"
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-backup-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_REGION
                  value: "us-east-1"
                - name: S3_BUCKET
                  value: "mrki-backups-production"
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
---
# =============================================================================
# Backup ServiceAccount
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-sa
  namespace: mrki-data
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/backup-role
---
# =============================================================================
# Backup Secrets
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aws-backup-credentials
  namespace: mrki-data
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
