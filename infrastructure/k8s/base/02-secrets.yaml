# =============================================================================
# Mrki Application Secrets (Template - Use External Secrets Operator in production)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mrki-secrets
  namespace: mrki-apps
type: Opaque
stringData:
  # Database Credentials
  DB_USERNAME: "mrki_app"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis Credentials
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # MongoDB Credentials
  MONGODB_USERNAME: "mrki_app"
  MONGODB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # JWT Configuration
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  JWT_REFRESH_SECRET: "CHANGE_ME_IN_PRODUCTION"
  
  # API Keys
  API_KEY_INTERNAL: "CHANGE_ME_IN_PRODUCTION"
  API_KEY_EXTERNAL: "CHANGE_ME_IN_PRODUCTION"
  
  # Third-party Service Keys
  STRIPE_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  STRIPE_WEBHOOK_SECRET: "CHANGE_ME_IN_PRODUCTION"
  
  SENDGRID_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  
  AWS_ACCESS_KEY_ID: "CHANGE_ME_IN_PRODUCTION"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME_IN_PRODUCTION"
  
  # Encryption Keys
  ENCRYPTION_KEY: "CHANGE_ME_IN_PRODUCTION"
  SIGNING_KEY: "CHANGE_ME_IN_PRODUCTION"
---
# External Secrets Operator Configuration
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mrki-secrets
  namespace: mrki-apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: mrki-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: mrki/production/database
        property: password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: mrki/production/redis
        property: password
    - secretKey: JWT_SECRET
      remoteRef:
        key: mrki/production/auth
        property: jwt_secret
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: mrki/production/payments
        property: stripe_secret
---
# ClusterSecretStore for AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
# Service Account for External Secrets
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/external-secrets-role
