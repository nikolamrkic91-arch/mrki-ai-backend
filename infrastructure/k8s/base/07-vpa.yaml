# =============================================================================
# Vertical Pod Autoscaler for Mrki API
# =============================================================================
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: mrki-api-vpa
  namespace: mrki-apps
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mrki-api
  updatePolicy:
    updateMode: "Auto"
    minReplicas: 2
  resourcePolicy:
    containerPolicies:
      - containerName: api
        minAllowed:
          cpu: 100m
          memory: 128Mi
        maxAllowed:
          cpu: 2000m
          memory: 2Gi
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsAndLimits
---
# =============================================================================
# Vertical Pod Autoscaler for Mrki Worker
# =============================================================================
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: mrki-worker-vpa
  namespace: mrki-apps
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mrki-worker
  updatePolicy:
    updateMode: "Off"  # Recommendations only for workers
  resourcePolicy:
    containerPolicies:
      - containerName: worker
        minAllowed:
          cpu: 50m
          memory: 64Mi
        maxAllowed:
          cpu: 4000m
          memory: 4Gi
        controlledResources: ["cpu", "memory"]
---
# =============================================================================
# Pod Disruption Budget
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mrki-api-pdb
  namespace: mrki-apps
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: mrki-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mrki-web-pdb
  namespace: mrki-apps
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mrki-web
