apiVersion: v2
name: mrki-app
description: A Helm chart for Mrki Application Suite
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - mrki
  - microservices
  - kubernetes
home: https://mrki.io
sources:
  - https://github.com/mrki/infrastructure
maintainers:
  - name: Mrki Team
    email: devops@mrki.io
dependencies:
  - name: postgresql
    version: 12.12.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 18.6.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: mongodb
    version: 14.4.0
    repository: https://charts.bitnami.com/bitnami
    condition: mongodb.enabled
  - name: kafka
    version: 26.4.0
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
