# =============================================================================
# Mrki - Complete Local Development Stack
# =============================================================================
#
# This Docker Compose file provides a complete local development environment
# for the Mrki platform, including:
# - Main Mrki API server
# - Core services (PostgreSQL, Redis)
# - Visual Engine with GPU support
# - MoE (Mixture-of-Experts) inference service
# - Development environment tools
# - Game development tools
# - Monitoring stack (Prometheus, Grafana)
# - Message queue (RabbitMQ)
# - IDE integration services
#
# Usage:
#   docker-compose -f docker-compose.full.yml up -d
#   docker-compose -f docker-compose.full.yml --profile gpu up -d
#   docker-compose -f docker-compose.full.yml --profile monitoring up -d
#
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # Core Services
  # ===========================================================================

  # Main Mrki API Server
  mrki-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PYTHON_VERSION=3.11
        - INSTALL_DEV=true
    container_name: mrki-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MRKI_SERVER_HOST=0.0.0.0
      - MRKI_SERVER_PORT=8080
      - MRKI_SERVER_DEBUG=false
      - MRKI_SERVER_WORKERS=4
      - MRKI_DATABASE_URL=postgresql://mrki:${POSTGRES_PASSWORD:-mrki_password}@postgres:5432/mrki
      - MRKI_REDIS_URL=redis://redis:6379/0
      - MRKI_SECURITY_SECRET_KEY=${MRKI_SECRET_KEY:-change-this-in-production}
      - MRKI_LOG_LEVEL=${MRKI_LOG_LEVEL:-INFO}
      - MRKI_CONFIG_PATH=/app/config/config.yaml
      - PYTHONPATH=/app
      # Module-specific settings
      - MRKI_CORE_ENABLED=true
      - MRKI_VISUAL_ENABLED=true
      - MRKI_DEV_ENV_ENABLED=true
      - MRKI_MOE_ENABLED=true
      - MRKI_GAMEDEV_ENABLED=true
      - MRKI_IDE_ENABLED=true
    volumes:
      - mrki_data:/app/data
      - mrki_logs:/app/logs
      - mrki_models:/app/models
      - ./config:/app/config:ro
      - ./plugins:/app/plugins:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mrki_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mrki-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=mrki
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mrki_password}
      - POSTGRES_DB=mrki
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - mrki_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrki -d mrki"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: mrki-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - mrki_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: mrki-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mrki_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Background Workers
  # ===========================================================================

  # Celery Worker for Background Tasks
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mrki-celery-worker
    restart: unless-stopped
    command: >
      celery -A mrki.worker worker
      --loglevel=info
      --concurrency=4
      --queues=default,visual,dev,gamedev
    environment:
      - MRKI_DATABASE_URL=postgresql://mrki:${POSTGRES_PASSWORD:-mrki_password}@postgres:5432/mrki
      - MRKI_REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - MRKI_SECURITY_SECRET_KEY=${MRKI_SECRET_KEY:-change-this-in-production}
      - MRKI_LOG_LEVEL=${MRKI_LOG_LEVEL:-INFO}
      - C_FORCE_ROOT=true
    volumes:
      - mrki_data:/app/data
      - mrki_models:/app/models
    depends_on:
      - redis
      - postgres
    networks:
      - mrki_network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mrki-celery-beat
    restart: unless-stopped
    command: >
      celery -A mrki.worker beat
      --loglevel=info
      --scheduler redbeat.RedBeatScheduler
    environment:
      - MRKI_DATABASE_URL=postgresql://mrki:${POSTGRES_PASSWORD:-mrki_password}@postgres:5432/mrki
      - MRKI_REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - REDBEAT_REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      - MRKI_SECURITY_SECRET_KEY=${MRKI_SECRET_KEY:-change-this-in-production}
    depends_on:
      - redis
      - postgres
    networks:
      - mrki_network

  # ===========================================================================
  # Visual Engine Services
  # ===========================================================================

  # Visual Engine Service (CPU)
  visual-engine:
    build:
      context: .
      dockerfile: Dockerfile.visual
    container_name: mrki-visual-engine
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - VISUAL_ENGINE_PORT=8000
      - VISUAL_ENGINE_MODEL_PATH=/app/models
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
    volumes:
      - mrki_models:/app/models
      - visual_cache:/app/cache
    depends_on:
      - redis
    networks:
      - mrki_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G

  # Visual Engine Service (GPU) - Optional
  visual-engine-gpu:
    build:
      context: .
      dockerfile: Dockerfile.visual.gpu
    container_name: mrki-visual-engine-gpu
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      - VISUAL_ENGINE_PORT=8000
      - VISUAL_ENGINE_MODEL_PATH=/app/models
      - CUDA_VISIBLE_DEVICES=0
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
    volumes:
      - mrki_models:/app/models
      - visual_cache:/app/cache
    depends_on:
      - redis
    networks:
      - mrki_network
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ===========================================================================
  # MoE (Mixture of Experts) Services
  # ===========================================================================

  # MoE Inference Service
  moe-inference:
    build:
      context: .
      dockerfile: Dockerfile.moe
    container_name: mrki-moe-inference
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      - MOE_PORT=8000
      - MOE_MODEL_PATH=/app/models/moe
      - MOE_NUM_EXPERTS=64
      - MOE_TOP_K=2
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
    volumes:
      - moe_models:/app/models/moe
    depends_on:
      - redis
    networks:
      - mrki_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G

  # MoE Training Service (Optional)
  moe-training:
    build:
      context: .
      dockerfile: Dockerfile.moe
    container_name: mrki-moe-training
    restart: "no"
    environment:
      - MOE_MODE=training
      - MOE_MODEL_PATH=/app/models/moe
      - MOE_NUM_EXPERTS=64
    volumes:
      - moe_models:/app/models/moe
      - training_data:/app/data
    networks:
      - mrki_network
    profiles:
      - training
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ===========================================================================
  # Game Development Services
  # ===========================================================================

  # Game Development API
  gamedev-api:
    build:
      context: .
      dockerfile: Dockerfile.gamedev
    container_name: mrki-gamedev-api
    restart: unless-stopped
    ports:
      - "8004:8000"
    environment:
      - GAMEDEV_PORT=8000
      - GAMEDEV_TEMPLATES_PATH=/app/templates
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
    volumes:
      - gamedev_templates:/app/templates
      - gamedev_cache:/app/cache
    depends_on:
      - redis
    networks:
      - mrki_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # IDE Integration Services
  # ===========================================================================

  # IDE Integration Server
  ide-server:
    build:
      context: .
      dockerfile: Dockerfile.ide
    container_name: mrki-ide-server
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      - IDE_PORT=8000
      - IDE_WS_PORT=8006
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
    volumes:
      - ide_projects:/app/projects
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - redis
    networks:
      - mrki_network

  # ===========================================================================
  # Monitoring Stack
  # ===========================================================================

  # Prometheus Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: mrki-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - mrki_network
    profiles:
      - monitoring

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: mrki-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/alerting:/etc/grafana/provisioning/alerting:ro
    ports:
      - "3000:3000"
    networks:
      - mrki_network
    profiles:
      - monitoring
    depends_on:
      - prometheus

  # Jaeger Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: mrki-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - mrki_network
    profiles:
      - monitoring

  # ===========================================================================
  # Reverse Proxy
  # ===========================================================================

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mrki-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - mrki-api
      - visual-engine
      - moe-inference
      - gamedev-api
    networks:
      - mrki_network
    profiles:
      - proxy

  # ===========================================================================
  # Development Tools
  # ===========================================================================

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mrki-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - mrki_network
    profiles:
      - dev

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mrki-pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@mrki.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - mrki_network
    profiles:
      - dev

  # Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mrki-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-redis_password}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - mrki_network
    profiles:
      - dev

# =============================================================================
# Volumes
# =============================================================================

volumes:
  mrki_data:
    driver: local
  mrki_logs:
    driver: local
  mrki_models:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  visual_cache:
    driver: local
  moe_models:
    driver: local
  training_data:
    driver: local
  gamedev_templates:
    driver: local
  gamedev_cache:
    driver: local
  ide_projects:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  pgadmin_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================

networks:
  mrki_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
