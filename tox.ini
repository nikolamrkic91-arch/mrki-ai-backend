[tox]
envlist = py39, py310, py311, py312, lint, typecheck, docs
isolated_build = True

[testenv]
deps = 
    pytest
    pytest-asyncio
    pytest-cov
    pytest-mock
    factory-boy
    faker
    httpx
    fastapi
    pydantic
commands =
    pytest {posargs}

[testenv:lint]
deps = ruff
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:typecheck]
deps =
    mypy
    types-pyyaml
    types-python-dateutil
    types-passlib
    pydantic
    pydantic-settings
commands =
    mypy src/

[testenv:docs]
deps =
    mkdocs
    mkdocs-material
    mkdocstrings[python]
commands =
    mkdocs build --strict

[testenv:coverage]
deps =
    pytest
    pytest-cov
    {[testenv]deps}
commands =
    pytest --cov=mrki --cov-report=html --cov-report=xml --cov-report=term

[testenv:security]
deps =
    bandit[toml]
    safety
commands =
    bandit -r src/
    safety check

[flake8]
max-line-length = 100
exclude = .git,__pycache__,build,dist,.tox,.eggs,*.egg

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests
