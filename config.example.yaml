# Mrki Configuration Example
# Copy this file to config.yaml and customize for your environment

# =============================================================================
# Server Configuration
# =============================================================================
server:
  # Host to bind to (use 0.0.0.0 for all interfaces)
  host: 0.0.0.0
  
  # Port to listen on
  port: 8080
  
  # Enable debug mode (disable in production)
  debug: false
  
  # Number of worker processes (0 = auto)
  workers: 4
  
  # Request timeout in seconds
  timeout: 30
  
  # Maximum request body size
  max_body_size: 10MB
  
  # CORS configuration
  cors:
    enabled: true
    origins:
      - "http://localhost:3000"
      - "http://localhost:8080"
    allow_credentials: true
    allow_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allow_headers:
      - "*"
  
  # SSL/TLS configuration (enable in production)
  ssl:
    enabled: false
    cert_file: /path/to/cert.pem
    key_file: /path/to/key.pem

# =============================================================================
# Database Configuration
# =============================================================================
database:
  # Database URL (SQLite, PostgreSQL, or MySQL)
  # SQLite: sqlite:///path/to/database.db
  # PostgreSQL: postgresql://user:password@host:port/database
  # MySQL: mysql+pymysql://user:password@host:port/database
  url: sqlite:///~/.config/mrki/mrki.db
  
  # Connection pool settings
  pool_size: 5
  max_overflow: 10
  pool_timeout: 30
  pool_recycle: 3600
  pool_pre_ping: true

# =============================================================================
# Security Configuration
# =============================================================================
security:
  # Secret key for JWT signing (CHANGE THIS IN PRODUCTION!)
  secret_key: "change-this-to-a-random-secret-key-in-production"
  
  # JWT algorithm
  jwt_algorithm: HS256
  
  # JWT expiration in seconds (1 hour)
  jwt_expiration: 3600
  
  # Refresh token expiration (7 days)
  refresh_expiration: 604800
  
  # API key header name
  api_key_header: X-API-Key
  
  # Allowed hosts
  allowed_hosts:
    - localhost
    - 127.0.0.1
  
  # Rate limiting
  rate_limit:
    enabled: true
    requests: 100
    window: 60
  
  # Password policy
  password_policy:
    min_length: 8
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_special: true

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO
  
  # Log format: json, text
  format: json
  
  # Log file path (optional, logs to stdout if not set)
  # file: ~/.config/mrki/mrki.log
  
  # Maximum log file size
  max_size: 10MB
  
  # Number of backup files to keep
  max_files: 5

# =============================================================================
# Plugin Configuration
# =============================================================================
plugins:
  # Plugin directory
  directory: ~/.config/mrki/plugins
  
  # Auto-load plugins on startup
  auto_load: true
  
  # List of enabled plugins
  enabled:
    - http
    - database
    - email
    - filesystem

# =============================================================================
# Scheduler Configuration
# =============================================================================
scheduler:
  # Enable scheduler
  enabled: true
  
  # Maximum concurrent workers
  max_workers: 10
  
  # Default timezone
  timezone: UTC

# =============================================================================
# Web Interface Configuration
# =============================================================================
web:
  # Enable web interface
  enabled: true
  
  # Dashboard title
  title: Mrki
  
  # Theme: default, dark, light
  theme: default

# =============================================================================
# Cache Configuration
# =============================================================================
cache:
  # Cache backend: memory, redis
  backend: memory
  
  # Default TTL in seconds
  default_ttl: 300

# =============================================================================
# Message Queue Configuration
# =============================================================================
queue:
  # Queue backend: memory, redis
  backend: memory

# =============================================================================
# Monitoring Configuration
# =============================================================================
monitoring:
  # Enable metrics collection
  enabled: true
  
  # Metrics endpoint
  endpoint: /metrics
  
  # Health check configuration
  health:
    enabled: true
    endpoint: /health
