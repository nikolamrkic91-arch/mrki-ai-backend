site_name: Mrki Documentation
site_description: Documentation for Mrki - A powerful workflow automation platform
site_author: Mrki Team
site_url: https://mrki.readthedocs.io

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  logo: images/logo.png
  favicon: images/favicon.png

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mrki/mrki
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/mrki
    - icon: fontawesome/brands/discord
      link: https://discord.gg/mrki
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes

nav:
  - Home: index.md
  - Getting Started:
    - Installation: guides/installation.md
    - Usage Guide: guides/usage.md
    - Configuration: guides/configuration.md
  - API Reference:
    - Overview: api/index.md
  - Development:
    - Contributing: guides/contributing.md
    - Roadmap: guides/roadmap.md
  - Support:
    - FAQ: guides/faq.md
